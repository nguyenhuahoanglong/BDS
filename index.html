// ===== BADGE STYLES =====
// Generate badge CSS dynamically based on districts in projects
var districtKeys = [...new Set(projects.map(p => p.district))];
var badgeCSS = districtKeys.map((d, i) => {
    var colors = ['#3498db','#e67e22','#2ecc71','#9b59b6','#e74c3c','#1abc9c','#f39c12','#795548'];
    var c = colors[i % colors.length];
    return '.badge-' + d + '{background:' + c + '22;color:' + c + '}';
}).join('\n');
var styleEl = document.createElement('style');
styleEl.textContent = badgeCSS;
document.head.appendChild(styleEl);

// ===== MAP INITIALIZATION =====
var map = L.map('map').setView([10.78,106.66],12);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri',maxZoom:19}).addTo(map);

// Draw district polygons
var polys = {};
for(var dn in districts){
    var c = dColors[dn] || '#999';
    polys[dn] = L.polygon(districts[dn],{color:c,weight:2,dashArray:'6,4',fillColor:c,fillOpacity:0.08}).addTo(map);
    var cn = polys[dn].getBounds().getCenter();
    L.marker(cn,{icon:L.divIcon({className:'dl',html:'<div style="font-size:11px;font-weight:700;color:'+c+';text-shadow:1px 1px 2px white,-1px -1px 2px white,1px -1px 2px white,-1px 1px 2px white;white-space:nowrap">'+dn+'</div>',iconSize:[80,15],iconAnchor:[40,7]})}).addTo(map);
}

// ===== FILTER BUTTONS =====
var fEl = document.getElementById('filters');
var btnAll = document.createElement('button');
btnAll.textContent = 'Tat ca';
btnAll.className = 'active';
btnAll.onclick = function(){filterD('all')};
fEl.appendChild(btnAll);

// Create filter button for each district in projects
districtKeys.forEach(function(d) {
    var btn = document.createElement('button');
    btn.textContent = d.toUpperCase();
    btn.onclick = function(){filterD(d)};
    fEl.appendChild(btn);
});

// ===== MARKERS & LIST =====
var markers = [];
var listEl = document.getElementById('plist');
projects.forEach(function(p,i){
    var dIdx = districtKeys.indexOf(p.district);
    var colors = ['#3498db','#e67e22','#2ecc71','#9b59b6','#e74c3c','#1abc9c','#f39c12','#795548'];
    var color = colors[dIdx % colors.length];
    var bg = color;
    var icon = L.divIcon({className:'cm',html:'<div style="background:'+color+';color:white;border:2px solid '+bg+';border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 5px rgba(0,0,0,.3)">'+String(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
    var mk = L.marker([p.lat,p.lng],{icon:icon}).addTo(map);
    var popupHtml = '<div style="min-width:200px"><h3 style="margin:0 0 5px;font-size:14px">'+String(i+1)+'. '+p.name+'</h3><div style="font-size:12px;line-height:1.5"><b style="color:#e74c3c">'+p.price+'</b><br>'+p.area+' | '+p.beds+' PN<br>'+p.addr+'<br>'+p.note;
    if(p.link) popupHtml += '<br><a href="'+p.link+'" target="_blank" style="color:#0563C1">Xem BDS</a>';
    popupHtml += '</div></div>';
    mk.bindPopup(popupHtml);
    markers.push({mk:mk,data:p});

    var div = document.createElement('div');
    div.className = 'pi';
    div.dataset.district = p.district;
    div.innerHTML = '<div class="pn">'+String(i+1)+'. '+p.name+'<span class="badge badge-'+p.district+'">'+p.district.toUpperCase()+'</span></div><div class="pf"><span class="pp">'+p.price+'</span> - '+p.area+'</div><div class="pf">'+p.addr+'</div>';
    div.onclick = (function(lt,ln,m){return function(){map.setView([lt,ln],17);m.openPopup()}})(p.lat,p.lng,mk);
    listEl.appendChild(div);
});

// ===== FILTER FUNCTION =====
function filterD(d){
    document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active')});
    event.target.classList.add('active');
    document.querySelectorAll('.pi').forEach(function(el){el.classList.toggle('hidden',d!=='all'&&el.dataset.district!==d)});
    markers.forEach(function(m){if(d==='all'||m.data.district===d)m.mk.addTo(map);else map.removeLayer(m.mk)});

    // Find matching district polygon to zoom
    if(d !== 'all') {
        // Try to find matching polygon
        for(var pn in polys) {
            if(pn.toLowerCase().replace(/[^a-z0-9]/g,'').includes(d.toLowerCase().replace(/[^a-z0-9]/g,''))) {
                map.fitBounds(polys[pn].getBounds().pad(0.1));
                return;
            }
        }
        // Fallback: fit to filtered markers
        var filtered = markers.filter(function(m){return m.data.district===d});
        if(filtered.length) {
            var bounds = filtered.map(function(m){return[m.data.lat,m.data.lng]});
            map.fitBounds(bounds,{padding:[30,30]});
        }
    } else {
        var ac = markers.map(function(m){return[m.data.lat,m.data.lng]});
        map.fitBounds(ac,{padding:[30,30]});
    }
}

// Initial view: fit all markers
var ac = markers.map(function(m){return[m.data.lat,m.data.lng]});
map.fitBounds(ac,{padding:[30,30]});
</script>
