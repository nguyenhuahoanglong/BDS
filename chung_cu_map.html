  var icon = L.divIcon({className:'cm',html:'<div style="background:'+color+';color:white;border:2px solid '+bg+';border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 5px rgba(0,0,0,.3)">'+String(i+1)+'</div>',iconSize:[26,26],iconAnchor:[13,13]});
  var mk = L.marker([p.lat,p.lng],{icon:icon}).addTo(map);
  mk.bindPopup('<div style="min-width:200px"><h3 style="margin:0 0 5px;font-size:14px">'+String(i+1)+'. '+p.name+'</h3><div style="font-size:12px;line-height:1.5"><b style="color:#e74c3c">'+p.price+'</b><br>'+p.area+' | '+p.beds+' PN<br>'+p.addr+'<br>'+p.note+'<br><a href="'+p.link+'" target="_blank" style="color:#0563C1">Xem BDS</a></div></div>');
  markers.push({mk:mk,data:p});
  var div = document.createElement('div');
  div.className = 'pi';
  div.dataset.district = p.district;
  div.innerHTML = '<div class="pn">'+String(i+1)+'. '+p.name+'<span class="badge badge-'+p.district+'">'+dl+'</span></div><div class="pf"><span class="pp">'+p.price+'</span> - '+p.area+'</div><div class="pf">'+p.addr+'</div>';
  div.onclick = (function(lt,ln,m){return function(){map.setView([lt,ln],17);m.openPopup()}})(p.lat,p.lng,mk);
  listEl.appendChild(div);
});

function filterD(d){
  document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active')});
  event.target.classList.add('active');
  document.querySelectorAll('.pi').forEach(function(el){el.classList.toggle('hidden',d!=='all'&&el.dataset.district!==d)});
  markers.forEach(function(m){if(d==='all'||m.data.district===d)m.mk.addTo(map);else map.removeLayer(m.mk)});
  if(d==='q8'&&polys['Quan 8'])map.fitBounds(polys['Quan 8'].getBounds().pad(0.1));
  else if(d==='q6'&&polys['Quan 6'])map.fitBounds(polys['Quan 6'].getBounds().pad(0.1));
  else{var a=markers.map(function(m){return[m.data.lat,m.data.lng]});map.fitBounds(a,{padding:[30,30]})}
}

var ac = projects.map(function(p){return[p.lat,p.lng]});
map.fitBounds(ac,{padding:[30,30]});
</script>
</body>
