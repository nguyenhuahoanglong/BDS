<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;overflow:hidden}

/* ===== DESKTOP LAYOUT (min-width: 769px) ===== */
#map{position:absolute;top:0;left:0;right:320px;bottom:0}
#panel{position:absolute;top:0;right:0;width:320px;bottom:0;background:#fff;overflow:hidden;display:flex;flex-direction:column;box-shadow:-2px 0 8px rgba(0,0,0,.15);z-index:1000}
#plist-wrap{flex:1;overflow-y:auto}

/* Header */
.ph{background:linear-gradient(135deg,#2E86AB,#1a5c7a);color:#fff;padding:14px;text-align:center;flex-shrink:0}
.ph h2{font-size:15px;margin-bottom:3px}.ph p{font-size:11px;opacity:.85}

/* Search bar */
.search-bar{padding:8px 12px;border-bottom:1px solid #eee;flex-shrink:0;display:flex;gap:6px;align-items:center}
.search-bar input{flex:1;padding:7px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:#2E86AB}
.sort-select{padding:6px 8px;border:1.5px solid #ddd;border-radius:8px;font-size:12px;font-family:inherit;outline:none;cursor:pointer;background:#fff;color:#333;flex-shrink:0}
.sort-select:focus{border-color:#2E86AB}

/* Filter chips */
.filters{padding:8px 12px;display:flex;gap:6px;border-bottom:1px solid #eee;flex-shrink:0;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters button{padding:6px 12px;border:1.5px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap;min-height:36px;flex-shrink:0}
.filters button.active{border-color:#2E86AB;background:#E8F4FD;color:#2E86AB}
.filters button:hover{border-color:#2E86AB}

/* Card list items */
.pi{padding:10px 12px 10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .2s;display:flex;min-height:60px}
.pi:hover{background:#f5f9fc}
.pi.hidden{display:none}
.pi.active{background:#EBF5FB}
.pi-stripe{width:4px;min-width:4px;border-radius:0 2px 2px 0;margin-right:10px;align-self:stretch}
.pi-body{flex:1;min-width:0}
.pi-row1{display:flex;align-items:baseline;gap:4px;margin-bottom:3px}
.pn{font-weight:600;font-size:14px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;flex-shrink:0}
.pi-row2{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px}
.price-chip{background:#e74c3c;color:#fff;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.pf{font-size:12px;color:#666}
.pf-addr{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Badge colors */
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}

/* ===== INFRASTRUCTURE LEGEND ===== */
.infra-legend{background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);font-size:12px;line-height:1.8}
.infra-legend h4{margin:0 0 6px;font-size:13px;font-weight:700}
.infra-legend .legend-line{display:inline-block;width:30px;height:0;border-top:3px solid #666;vertical-align:middle;margin-right:6px}
.infra-legend .legend-line.dashed{border-top-style:dashed}
.infra-legend .legend-line.dotted{border-top-style:dotted}
.station-marker{background:#fff;border:2px solid #4CAF50;border-radius:50%;width:10px;height:10px;box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ===== MOBILE LAYOUT (max-width: 768px) ===== */
@media(max-width:768px){
  body{overflow:hidden}

  /* Map fills full viewport */
  #map{position:fixed;top:0;left:0;right:0;bottom:0}

  /* Hide desktop panel */
  #panel{display:none}

  /* ===== BOTTOM SHEET ===== */
  #sheet{
    position:fixed;
    left:0;right:0;bottom:0;
    z-index:1000;
    background:#fff;
    border-radius:16px 16px 0 0;
    box-shadow:0 -4px 20px rgba(0,0,0,.2);
    display:flex;
    flex-direction:column;
    touch-action:none;
    transition:transform 0.3s ease;
    /* Height is managed by JS snap points via transform */
    height:95vh;
    transform:translateY(calc(95vh - 120px)); /* default: peek */
  }
  #sheet.snapping{transition:transform 0.3s ease}
  #sheet.no-transition{transition:none}

  /* Drag handle */
  #drag-handle{
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px 0 6px;
    touch-action:none;
    cursor:grab;
  }
  #drag-handle-bar{
    width:40px;height:4px;
    background:#ccc;border-radius:2px;
  }

  /* Sheet header */
  .sh-header{
    flex-shrink:0;
    background:linear-gradient(135deg,#2E86AB,#1a5c7a);
    color:#fff;
    padding:10px 14px;
    text-align:center;
  }
  .sh-header h2{font-size:15px;margin-bottom:2px}
  .sh-header p{font-size:11px;opacity:.85}

  /* Sheet scrollable area */
  #sheet-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

  /* Dim overlay at full snap */
  #sheet-overlay{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.3);
    z-index:999;
  }

  /* Infrastructure toggle button (mobile) */
  #infra-btn{
    position:fixed;
    left:12px;
    bottom:130px;
    z-index:1001;
    width:40px;height:40px;
    border-radius:50%;
    background:#fff;
    border:none;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;color:#555;
  }

  /* Layer control collapsed on mobile */
  .leaflet-control-layers-expanded{display:none !important}

  /* Filters in sheet */
  .filters{padding:6px 10px}
  .filters button{font-size:11px;padding:5px 10px;min-height:34px}

  /* Cards in sheet */
  .pi{padding:8px 10px 8px 0;min-height:56px}
  .pn{font-size:14px}
  .pf{font-size:12px}
  .pf-addr{font-size:11px}
}
</style>
</head>
<body>
<!-- ===== MAP ===== -->
<div id="map"></div>

<!-- ===== DESKTOP PANEL ===== -->
<div id="panel">
  <div class="ph"><h2>{{TITLE}}</h2><p>{{SUBTITLE}}</p></div>
  <div class="search-bar">
    <input type="text" id="search-desktop" placeholder="Tim kiem du an..." autocomplete="off"/>
    <select class="sort-select" id="sort-desktop">
      <option value="default">Mac dinh</option>
      <option value="price-asc">Gia tang dan</option>
      <option value="price-desc">Gia giam dan</option>
      <option value="name-asc">Ten A-Z</option>
    </select>
  </div>
  <div class="filters" id="filters-desktop"></div>
  <div id="plist-wrap"><div id="plist"></div></div>
</div>

<!-- ===== MOBILE BOTTOM SHEET ===== -->
<div id="sheet-overlay"></div>
<div id="sheet" style="display:none">
  <div id="drag-handle"><div id="drag-handle-bar"></div></div>
  <div class="sh-header"><h2>{{TITLE}}</h2><p>{{SUBTITLE}}</p></div>
  <div class="search-bar">
    <input type="text" id="search-mobile" placeholder="Tim kiem du an..." autocomplete="off"/>
    <select class="sort-select" id="sort-mobile">
      <option value="default">Mac dinh</option>
      <option value="price-asc">Gia tang dan</option>
      <option value="price-desc">Gia giam dan</option>
      <option value="name-asc">Ten A-Z</option>
    </select>
  </div>
  <div class="filters" id="filters-mobile"></div>
  <div id="sheet-scroll"><div id="plist-mobile"></div></div>
</div>

<!-- Mobile infrastructure toggle button -->
<button id="infra-btn" style="display:none" title="Ha tang giao thong">i</button>

<script>
// ===== DISTRICT DATA =====
var districts = {{DISTRICTS_JSON}};

// ===== DISTRICT COLORS =====
var dColors = {{COLORS_JSON}};

// ===== PROJECT DATA =====
var projects = {{PROJECTS_JSON}};

// ===== INFRASTRUCTURE DATA =====
var infrastructure = {{INFRASTRUCTURE_JSON}};

// ===== HELPERS =====
function removeDiacritics(s) {
  return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function parseMinPrice(priceStr) {
  if (!priceStr) return Infinity;
  var m = String(priceStr).match(/(\d+\.?\d*)/);
  return m ? parseFloat(m[1]) : Infinity;
}

// ===== BADGE STYLES =====
var districtKeys = [].concat.apply([], [projects.map(function(p){return p.district;})]).filter(function(v,i,a){return a.indexOf(v)===i;});
var palColors = ['#3498db','#e67e22','#2ecc71','#9b59b6','#e74c3c','#1abc9c','#f39c12','#795548'];
var badgeCSS = districtKeys.map(function(d, i) {
  var c = palColors[i % palColors.length];
  return '.badge-' + d + '{background:' + c + '22;color:' + c + '}';
}).join('\n');
var styleEl = document.createElement('style');
styleEl.textContent = badgeCSS;
document.head.appendChild(styleEl);

// Color by district index
function districtColor(d) {
  var idx = districtKeys.indexOf(d);
  return palColors[idx < 0 ? 0 : idx % palColors.length];
}

// ===== MAP INITIALIZATION =====
var map = L.map('map').setView([10.78,106.66],12);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{attribution:'Tiles &copy; Esri',maxZoom:19}).addTo(map);

// ===== DISTRICT POLYGONS =====
var polys = {};
for(var dn in districts){
  var c = dColors[dn] || '#999';
  polys[dn] = L.polygon(districts[dn],{color:c,weight:2,dashArray:'6,4',fillColor:c,fillOpacity:0.08}).addTo(map);
  var cn = polys[dn].getBounds().getCenter();
  L.marker(cn,{icon:L.divIcon({className:'dl',html:'<div style="font-size:11px;font-weight:700;color:'+c+';text-shadow:1px 1px 2px white,-1px -1px 2px white,1px -1px 2px white,-1px 1px 2px white;white-space:nowrap">'+dn+'</div>',iconSize:[80,15],iconAnchor:[40,7]})}).addTo(map);
}

// ===== MARKER CLUSTER =====
var clusterGroup = L.markerClusterGroup({maxClusterRadius:50, spiderfyOnMaxZoom:true});
map.addLayer(clusterGroup);

// ===== STATE =====
var activeDistrict = 'all';
var searchQuery = '';
var sortOrder = 'default';

// ===== BUILD MARKERS & LIST ITEMS =====
var markers = [];  // [{mk, data, listDesktop, listMobile}]
var listEl = document.getElementById('plist');
var listMobileEl = document.getElementById('plist-mobile');

projects.forEach(function(p, i) {
  var color = districtColor(p.district);

  // Marker icon
  var icon = L.divIcon({
    className:'cm',
    html:'<div style="background:'+color+';color:white;border:2px solid '+color+';border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 5px rgba(0,0,0,.3)">'+String(i+1)+'</div>',
    iconSize:[26,26],iconAnchor:[13,13]
  });

  var mk = L.marker([p.lat,p.lng],{icon:icon});

  // Popup
  var bedsWc = '';
  if(p.beds) bedsWc += p.beds + ' PN';
  if(p.wc) bedsWc += (bedsWc ? ' | ' : '') + p.wc + ' WC';
  var popupHtml = '<div style="min-width:200px"><h3 style="margin:0 0 5px;font-size:14px">'+String(i+1)+'. '+p.name+'</h3><div style="font-size:12px;line-height:1.5"><b style="color:#e74c3c">'+p.price+'</b><br>'+(p.area||'')+(bedsWc ? ' | '+bedsWc : '')+'<br>'+(p.addr||'')+'<br>'+(p.note||'');
  if(p.link) popupHtml += '<br><a href="'+p.link+'" target="_blank" style="color:#0563C1">Xem BDS</a>';
  popupHtml += '</div></div>';
  mk.bindPopup(popupHtml);

  // Create list card (used for both desktop and mobile)
  function makeCard() {
    var div = document.createElement('div');
    div.className = 'pi';
    div.dataset.district = p.district;
    div.dataset.idx = String(i);

    var stripe = document.createElement('div');
    stripe.className = 'pi-stripe';
    stripe.style.background = color;

    var body = document.createElement('div');
    body.className = 'pi-body';

    var row1 = document.createElement('div');
    row1.className = 'pi-row1';
    var nameEl = document.createElement('div');
    nameEl.className = 'pn';
    nameEl.textContent = String(i+1)+'. '+p.name;
    var badgeEl = document.createElement('span');
    badgeEl.className = 'badge badge-'+p.district;
    badgeEl.textContent = p.district.toUpperCase();
    row1.appendChild(nameEl);
    row1.appendChild(badgeEl);

    var row2 = document.createElement('div');
    row2.className = 'pi-row2';
    if(p.price) {
      var priceEl = document.createElement('span');
      priceEl.className = 'price-chip';
      priceEl.textContent = p.price;
      row2.appendChild(priceEl);
    }
    if(p.area) {
      var areaEl = document.createElement('span');
      areaEl.className = 'pf';
      areaEl.textContent = p.area;
      row2.appendChild(areaEl);
    }
    if(bedsWc) {
      var bedsEl = document.createElement('span');
      bedsEl.className = 'pf';
      bedsEl.textContent = bedsWc;
      row2.appendChild(bedsEl);
    }

    var row3 = document.createElement('div');
    row3.className = 'pf-addr';
    row3.textContent = p.addr || '';

    body.appendChild(row1);
    body.appendChild(row2);
    body.appendChild(row3);
    div.appendChild(stripe);
    div.appendChild(body);
    return div;
  }

  var cardDesktop = makeCard();
  var cardMobile = makeCard();

  // Click: zoom + popup
  function onCardClick(lt, ln, m) {
    return function() {
      map.setView([lt,ln],17);
      m.openPopup();
    };
  }
  cardDesktop.onclick = onCardClick(p.lat, p.lng, mk);
  cardMobile.onclick = onCardClick(p.lat, p.lng, mk);

  listEl.appendChild(cardDesktop);
  listMobileEl.appendChild(cardMobile);

  // Map marker click -> highlight list item
  mk.on('popupopen', (function(idx) {
    return function() {
      highlightListItem(idx);
    };
  })(i));

  markers.push({mk:mk, data:p, listDesktop:cardDesktop, listMobile:cardMobile});
  clusterGroup.addLayer(mk);
});

// ===== HIGHLIGHT LIST ITEM =====
function highlightListItem(idx) {
  document.querySelectorAll('.pi.active').forEach(function(el){el.classList.remove('active')});
  var m = markers[idx];
  if(!m) return;
  [m.listDesktop, m.listMobile].forEach(function(card) {
    if(card && !card.classList.contains('hidden')) {
      card.classList.add('active');
      card.scrollIntoView({behavior:'smooth', block:'nearest'});
    }
  });
}

// ===== APPLY FILTERS (unified) =====
function applyFilters() {
  var q = removeDiacritics(searchQuery);
  var sortedIndices = projects.map(function(_,i){return i;});

  // Sort
  if(sortOrder === 'price-asc') {
    sortedIndices.sort(function(a,b){ return parseMinPrice(projects[a].price) - parseMinPrice(projects[b].price); });
  } else if(sortOrder === 'price-desc') {
    sortedIndices.sort(function(a,b){ return parseMinPrice(projects[b].price) - parseMinPrice(projects[a].price); });
  } else if(sortOrder === 'name-asc') {
    sortedIndices.sort(function(a,b){ return removeDiacritics(projects[a].name).localeCompare(removeDiacritics(projects[b].name)); });
  }

  // Reorder DOM (both lists)
  sortedIndices.forEach(function(idx) {
    listEl.appendChild(markers[idx].listDesktop);
    listMobileEl.appendChild(markers[idx].listMobile);
  });

  // Show/hide and update cluster
  clusterGroup.clearLayers();
  sortedIndices.forEach(function(idx) {
    var m = markers[idx];
    var p = m.data;
    var districtMatch = (activeDistrict === 'all' || p.district === activeDistrict);
    var nameNorm = removeDiacritics(p.name);
    var addrNorm = removeDiacritics(p.addr);
    var searchMatch = !q || nameNorm.indexOf(q) !== -1 || addrNorm.indexOf(q) !== -1;
    var visible = districtMatch && searchMatch;

    if(visible) {
      m.listDesktop.classList.remove('hidden');
      m.listMobile.classList.remove('hidden');
      clusterGroup.addLayer(m.mk);
    } else {
      m.listDesktop.classList.add('hidden');
      m.listMobile.classList.add('hidden');
    }
  });

  // Zoom to district polygon or filtered bounds
  if(activeDistrict !== 'all') {
    for(var pn in polys) {
      if(pn.toLowerCase().replace(/[^a-z0-9]/g,'').indexOf(activeDistrict.toLowerCase().replace(/[^a-z0-9]/g,'')) !== -1) {
        map.fitBounds(polys[pn].getBounds().pad(0.1));
        return;
      }
    }
    var filtered = markers.filter(function(m){ return m.data.district === activeDistrict; });
    if(filtered.length) {
      map.fitBounds(filtered.map(function(m){return[m.data.lat,m.data.lng];}),{padding:[30,30]});
    }
  }
}

// ===== FILTER BUTTONS =====
function buildFilterButtons(containerId) {
  var fEl = document.getElementById(containerId);
  fEl.innerHTML = '';
  var btnAll = document.createElement('button');
  btnAll.textContent = 'Tat ca (' + projects.length + ')';
  btnAll.className = 'active';
  btnAll.onclick = function() {
    activeDistrict = 'all';
    document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active')});
    // Activate both "Tat ca" buttons
    document.querySelectorAll('.filters button:first-child').forEach(function(b){b.classList.add('active')});
    applyFilters();
    // Fit all
    var ac = markers.map(function(m){return[m.data.lat,m.data.lng];});
    if(ac.length) map.fitBounds(ac,{padding:[30,30]});
  };
  fEl.appendChild(btnAll);

  districtKeys.forEach(function(d) {
    var count = projects.filter(function(p){return p.district===d;}).length;
    var btn = document.createElement('button');
    btn.textContent = d.toUpperCase() + ' (' + count + ')';
    btn.dataset.district = d;
    btn.onclick = function() {
      activeDistrict = d;
      document.querySelectorAll('.filters button').forEach(function(b){b.classList.remove('active')});
      document.querySelectorAll('.filters button[data-district="'+d+'"]').forEach(function(b){b.classList.add('active')});
      applyFilters();
    };
    fEl.appendChild(btn);
  });
}

buildFilterButtons('filters-desktop');
buildFilterButtons('filters-mobile');

// ===== SEARCH =====
var searchDebounce = null;
function onSearch(val) {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(function() {
    searchQuery = val;
    applyFilters();
  }, 300);
}
document.getElementById('search-desktop').oninput = function() { onSearch(this.value); };
document.getElementById('search-mobile').oninput = function() { onSearch(this.value); };

// ===== SORT =====
function onSort(val) {
  sortOrder = val;
  applyFilters();
}
document.getElementById('sort-desktop').onchange = function() { onSort(this.value); };
document.getElementById('sort-mobile').onchange = function() { onSort(this.value); };

// ===== INITIAL VIEW =====
var ac = markers.map(function(m){return[m.data.lat,m.data.lng];});
if(ac.length) map.fitBounds(ac,{padding:[30,30]});

// ===== INFRASTRUCTURE LAYERS =====
var statusStyle = {
  operational: {dashArray: null, opacity: 0.9, weight: 4},
  construction: {dashArray: '12,8', opacity: 0.7, weight: 4},
  planned: {dashArray: '4,10', opacity: 0.45, weight: 3}
};

var metroLayer = L.layerGroup();
var highwayLayer = L.layerGroup();
var ringroadLayer = L.layerGroup();
var layerMap = {metro: metroLayer, highway: highwayLayer, ringroad: ringroadLayer};

infrastructure.forEach(function(route) {
  var style = statusStyle[route.status] || statusStyle.planned;
  var polyline = L.polyline(route.coords, {
    color: route.color,
    weight: style.weight,
    opacity: style.opacity,
    dashArray: style.dashArray,
    lineJoin: 'round',
    lineCap: 'round'
  });

  var statusIcon = route.status === 'operational' ? '✅' : route.status === 'construction' ? '🔨' : '📋';
  var yearText = route.completionYear ? route.completionYear : 'Chua xac dinh';
  var popupHtml = '<div style="min-width:180px">'
    + '<h3 style="margin:0 0 5px;font-size:13px">' + route.name + '</h3>'
    + '<div style="font-size:12px;line-height:1.6">'
    + '<b>' + statusIcon + ' ' + route.statusVi + '</b><br>'
    + 'Chieu dai: ' + route.length + '<br>'
    + 'Hoan thanh: ' + yearText + '<br>'
    + '<span style="color:#666;font-size:11px">' + route.description + '</span>'
    + '</div></div>';
  polyline.bindPopup(popupHtml);

  var targetLayer = layerMap[route.type];
  if(targetLayer) polyline.addTo(targetLayer);

  if(route.stations && route.stations.length > 0) {
    route.stations.forEach(function(st) {
      var stIcon = L.divIcon({
        className: 'station-marker-wrap',
        html: '<div class="station-marker" style="border-color:' + route.color + '"></div>',
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });
      var stMarker = L.marker([st.lat, st.lng], {icon: stIcon});
      stMarker.bindTooltip(st.name, {permanent: false, direction: 'top', offset: [0, -8]});
      stMarker.addTo(targetLayer);
    });
  }
});

metroLayer.addTo(map);
highwayLayer.addTo(map);
ringroadLayer.addTo(map);

var overlays = {
  '🚇 Metro': metroLayer,
  '🛣️ Cao toc': highwayLayer,
  '⭕ Vanh dai': ringroadLayer
};
L.control.layers(null, overlays, {collapsed: false, position: 'topright'}).addTo(map);

// Legend control
var legend = L.control({position: 'bottomleft'});
legend.onAdd = function() {
  var div = L.DomUtil.create('div', 'infra-legend');

// ===== MOBILE SETUP =====
(function() {
  var isMobile = window.innerWidth <= 768;
  if(!isMobile) return;

  var sheet = document.getElementById('sheet');
  var overlay = document.getElementById('sheet-overlay');
  var handle = document.getElementById('drag-handle');
  var sheetScroll = document.getElementById('sheet-scroll');
  var infraBtn = document.getElementById('infra-btn');
  var sheetHeight = sheet.offsetHeight || window.innerHeight * 0.95;

  // Snap points (translateY values): peek, half, full
  var PEEK = sheetHeight - 120;  // shows handle + header + filters
  var HALF = sheetHeight - window.innerHeight * 0.5;
  var FULL = sheetHeight - window.innerHeight * 0.9;
  var snapPoints = [PEEK, HALF, FULL];

  // Show sheet
  sheet.style.display = 'flex';
  infraBtn.style.display = 'flex';

  var currentTranslateY = HALF;  // default: half
  function setSnap(y, animate) {
    currentTranslateY = y;
    if(animate) {
      sheet.classList.add('snapping');
    } else {
      sheet.classList.add('no-transition');
    }
    sheet.style.transform = 'translateY(' + y + 'px)';
    // Show/hide overlay at full snap
    overlay.style.display = (y <= FULL + 5) ? 'block' : 'none';
    setTimeout(function() {
      sheet.classList.remove('snapping');
      sheet.classList.remove('no-transition');
    }, 350);
  }

  setSnap(HALF, true);

  // Overlay click: collapse to peek
  overlay.onclick = function() { setSnap(PEEK, true); };

  // ===== DRAG HANDLE TOUCH =====
  var dragStartY = 0;
  var dragStartTranslate = 0;
  var isDragging = false;

  handle.addEventListener('touchstart', function(e) {
    e.stopPropagation();
    isDragging = true;
    dragStartY = e.touches[0].clientY;
    dragStartTranslate = currentTranslateY;
    sheet.classList.add('no-transition');
  }, {passive: false});

  handle.addEventListener('touchmove', function(e) {
    e.stopPropagation();
    if(!isDragging) return;
    var dy = e.touches[0].clientY - dragStartY;
    var newY = Math.max(FULL - 10, Math.min(PEEK + 10, dragStartTranslate + dy));
    currentTranslateY = newY;
    sheet.style.transform = 'translateY(' + newY + 'px)';
    overlay.style.display = (newY <= FULL + 5) ? 'block' : 'none';
  }, {passive: false});

  handle.addEventListener('touchend', function(e) {
    e.stopPropagation();
    isDragging = false;
    sheet.classList.remove('no-transition');
    // Snap to nearest point
    var nearest = snapPoints.reduce(function(prev, curr) {
      return Math.abs(curr - currentTranslateY) < Math.abs(prev - currentTranslateY) ? curr : prev;
    });
    setSnap(nearest, true);
  }, {passive: false});

  // ===== SHEET SCROLL AREA: allow drag only when at top =====
  var scrollDragStart = null;
  sheetScroll.addEventListener('touchstart', function(e) {
    scrollDragStart = {y: e.touches[0].clientY, scrollTop: sheetScroll.scrollTop};
  }, {passive: true});

  sheetScroll.addEventListener('touchmove', function(e) {
    if(!scrollDragStart) return;
    var dy = e.touches[0].clientY - scrollDragStart.y;
    // Drag sheet down only when already at top of scroll
    if(sheetScroll.scrollTop === 0 && dy > 0) {
      // Let the sheet drag logic handle it — but we need to propagate to handle
      // Instead: manually move sheet
      var newY = Math.min(PEEK + 10, currentTranslateY + dy * 0.5);
      if(newY > currentTranslateY) {
        sheet.classList.add('no-transition');
        currentTranslateY = newY;
        sheet.style.transform = 'translateY(' + newY + 'px)';
      }
    }
  }, {passive: true});

  sheetScroll.addEventListener('touchend', function() {
    if(sheetScroll.scrollTop === 0) {
      var nearest = snapPoints.reduce(function(prev, curr) {
        return Math.abs(curr - currentTranslateY) < Math.abs(prev - currentTranslateY) ? curr : prev;
      });
      setSnap(nearest, true);
    }
    scrollDragStart = null;
  }, {passive: true});

  // ===== INFRASTRUCTURE TOGGLE BUTTON =====
  var legendVisible = false;
  infraBtn.onclick = function() {
    legendVisible = !legendVisible;
    var legendEl = document.querySelector('.infra-legend');
    if(legendEl) {
      legendEl.style.display = legendVisible ? '' : 'none';
    }
    infraBtn.style.background = legendVisible ? '#2E86AB' : '#fff';
    infraBtn.style.color = legendVisible ? '#fff' : '#555';
  };

  // Hide legend by default on mobile
  setTimeout(function() {
    var legendEl = document.querySelector('.infra-legend');
    if(legendEl) legendEl.style.display = 'none';
  }, 100);

  // Invalidate map size after layout
  setTimeout(function() { map.invalidateSize(); }, 400);
})();
</script>
